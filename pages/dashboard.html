<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Dashboard — Interview Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #111010;
      --ink-muted: #6b6b6b;
      --paper: #faf9f6;
      --paper-off: #f1efe8;
      --accent: #c84b2f;
      --rule: #d8d6cf;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --max: 900px;
    }
    body {
      font-family: var(--font-body);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 0 1.5rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-brand span { color: var(--accent); }
    .nav-back {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
    }
    .nav-back:hover { color: var(--accent); }
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 5rem 1.5rem 3rem;
    }
    .page-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      margin-bottom: 0.35rem;
    }
    .sub {
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--ink-muted);
      margin-bottom: 1.75rem;
    }
    .dash-grid {
      display: grid;
      gap: 12px;
    }
    @media (min-width: 640px) {
      .dash-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 900px) {
      .dash-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .mod-card {
      background: var(--paper-off);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 1.1rem 1.25rem;
    }
    .mod-card .title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.65rem;
    }
    .mod-meta {
      font-size: 0.8rem;
      color: var(--ink-muted);
      margin-bottom: 0.5rem;
    }
    .bar-wrap {
      height: 8px;
      background: var(--rule);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 0.35rem;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      width: 0%;
      transition: width 0.35s ease;
    }
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 2px;
      margin-top: 0.5rem;
    }
    .badge-played { background: #e4edf9; color: #1a4a82; }
    .badge-new { background: var(--paper); color: var(--ink-muted); border: 1px solid var(--rule); }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-brand">Interview <span>Arcade</span></a>
    <a href="../modules.html" class="nav-back">← Modules</a>
  </nav>

  <main>
    <div class="page-eyebrow">Module 10 · Dashboard</div>
    <h1>Progress Dashboard</h1>
    <p class="sub">Activity pulled from your browser’s localStorage when you play linked modules (attempts, scores, completions).</p>
    <div class="dash-grid" id="dashGrid"></div>
  </main>

  <script src="../scripts/storage.js"></script>
  <script>
    (function () {
      function fmtDate(iso) {
        if (!iso) return '—';
        try {
          return new Date(iso).toLocaleDateString(undefined, { dateStyle: 'medium' });
        } catch (e) {
          return '—';
        }
      }

      function completionBar(p) {
        var attempts = p.attempts || 0;
        var completions = p.completions || 0;
        if (attempts === 0 && completions === 0) return 0;
        var rate = completions / Math.max(attempts, 1);
        return Math.min(100, Math.round(rate * 100));
      }

      function render() {
        var grid = document.getElementById('dashGrid');
        var all = IAStorage.getAllProgress();
        var mods = IAStorage.MODULES;

        grid.innerHTML = '';
        for (var i = 0; i < mods.length; i++) {
          var m = mods[i];
          var p = all[m.id] || {};
          var attempts = p.attempts || 0;
          var completions = p.completions || 0;
          var pct = typeof p.lastScorePercent === 'number' ? p.lastScorePercent : null;
          var best = typeof p.bestScorePercent === 'number' ? p.bestScorePercent : null;
          var mem = p.bestMemoryAttempts != null ? p.bestMemoryAttempts : null;
          var lastMem = p.lastMemoryAttempts != null ? p.lastMemoryAttempts : null;

          var card = document.createElement('div');
          card.className = 'mod-card';

          var title = document.createElement('div');
          title.className = 'title';
          title.textContent = m.title;

          var meta = document.createElement('div');
          meta.className = 'mod-meta';
          var lines = [];
          lines.push('Attempts: ' + attempts);
          lines.push('Completions: ' + completions);
          if (pct != null) lines.push('Last quiz score: ' + pct + '%');
          if (best != null && best !== pct) lines.push('Best quiz: ' + best + '%');
          if (mem != null) lines.push('Best memory game: ' + mem + ' attempts');
          if (lastMem != null && lastMem !== mem) lines.push('Last memory: ' + lastMem + ' attempts');
          lines.push('Last played: ' + fmtDate(p.lastPlayed));
          meta.innerHTML = lines.join('<br>');

          var barWrap = document.createElement('div');
          barWrap.className = 'bar-wrap';
          var bar = document.createElement('div');
          bar.className = 'bar-fill';
          var fill = completionBar(p);
          bar.style.width = fill + '%';
          barWrap.appendChild(bar);

          var badge = document.createElement('span');
          badge.className = 'badge ' + (attempts > 0 || completions > 0 ? 'badge-played' : 'badge-new');
          badge.textContent = attempts > 0 || completions > 0 ? 'Activity' : 'Not played yet';

          card.appendChild(title);
          card.appendChild(meta);
          card.appendChild(barWrap);
          card.appendChild(badge);
          grid.appendChild(card);
        }
      }

      render();
    })();
  </script>
</body>
</html>
