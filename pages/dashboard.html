<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Dashboard - Interview Arcade</title>
    <link rel="stylesheet" href="styles/main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .dashboard-header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .dashboard-header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            color: #666;
        }

        /* Stats Overview Cards */
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .overview-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .overview-card:hover {
            transform: translateY(-5px);
        }

        .overview-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .overview-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .overview-label {
            color: #666;
            font-size: 14px;
        }

        /* Modules Grid */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .module-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .module-card:hover {
            transform: translateY(-5px);
        }

        .module-header {
            padding: 20px;
            color: white;
            position: relative;
        }

        .module-header h3 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .module-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .module-status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-completed {
            background: #28a745;
            color: white;
        }

        .status-in-progress {
            background: #ffc107;
            color: #333;
        }

        .status-not-started {
            background: #dc3545;
            color: white;
        }

        .module-content {
            padding: 20px;
        }

        /* Score Section */
        .score-section {
            margin-bottom: 20px;
        }

        .score-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            color: #666;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            height: 8px;
            margin: 10px 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stat-number {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .stat-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        /* Recent Activity */
        .recent-activity {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .recent-activity h3 {
            margin-bottom: 20px;
            color: #333;
        }

        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .activity-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.3s;
        }

        .activity-item:hover {
            background: #f8f9fa;
        }

        .activity-icon {
            font-size: 30px;
        }

        .activity-details {
            flex: 1;
        }

        .activity-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .activity-meta {
            font-size: 12px;
            color: #666;
        }

        .activity-score {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .no-activity {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-2px);
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }

        .badge-gold {
            background: #ffc107;
            color: #333;
        }

        .badge-silver {
            background: #c0c0c0;
            color: #333;
        }

        .badge-bronze {
            background: #cd7f32;
            color: white;
        }

        @media (max-width: 768px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .dashboard-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-wrapper">
        <!-- Header -->
        <div class="dashboard-header">
            <h1>📊 Progress Dashboard</h1>
            <p>Track your learning journey across all modules</p>
        </div>

        <!-- Stats Overview -->
        <div class="stats-overview" id="statsOverview">
            <!-- Dynamic stats will be loaded here -->
        </div>

        <!-- Modules Grid -->
        <div class="modules-grid" id="modulesGrid">
            <!-- Dynamic module cards will be loaded here -->
        </div>

        <!-- Recent Activity -->
        <div class="recent-activity">
            <h3>🕒 Recent Activity</h3>
            <div class="activity-list" id="activityList">
                <!-- Dynamic activity will be loaded here -->
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="refreshDashboard()">🔄 Refresh</button>
            <button class="btn btn-danger" onclick="resetAllProgress()">⚠️ Reset All Progress</button>
        </div>
    </div>

    <script src="scripts/storage.js"></script>
    <script>
        // Module configuration
        const MODULES = [
            {
                id: 'tictactoe',
                name: 'Tic Tac Toe',
                description: 'OOP Quiz Challenge',
                icon: '❌',
                color: '#2196F3',
                maxScore: 10,
                scoreKey: 'tictactoe_scores',
                attemptsKey: 'tictactoe_attempts',
                historyKey: 'tictactoe_history'
            },
            {
                id: 'aptitude',
                name: 'Aptitude Quiz',
                description: 'Reasoning & Aptitude',
                icon: '📊',
                color: '#FF5722',
                maxScore: 10,
                scoreKey: 'aptitude_high_scores',
                attemptsKey: 'aptitude_attempts',
                historyKey: 'aptitude_history'
            },
            {
                id: 'dsa_match',
                name: 'DSA Match',
                description: 'Match Terms & Definitions',
                icon: '🔗',
                color: '#9C27B0',
                maxScore: 8,
                scoreKey: 'dsa_match_scores',
                attemptsKey: 'dsa_match_attempts',
                historyKey: 'dsa_match_history'
            },
            {
                id: 'sql',
                name: 'SQL Fill Blanks',
                description: 'SQL Query Challenge',
                icon: '🗄️',
                color: '#FF9800',
                maxScore: 8,
                scoreKey: 'sql_quiz_scores',
                attemptsKey: 'sql_attempts',
                historyKey: 'sql_history'
            },
            {
                id: 'feedback',
                name: 'Feedback',
                description: 'Share Your Thoughts',
                icon: '📝',
                color: '#4CAF50',
                maxScore: 5,
                scoreKey: 'interview_arcade_feedbacks',
                attemptsKey: 'feedback_attempts',
                historyKey: 'feedback_history'
            }
        ];

        class ProgressDashboard {
            constructor() {
                this.modulesData = {};
                this.overallStats = {
                    totalScore: 0,
                    totalAttempts: 0,
                    completedModules: 0,
                    averageScore: 0
                };
            }

            loadAllData() {
                this.modulesData = {};
                
                MODULES.forEach(module => {
                    let data = {
                        scores: [],
                        attempts: 0,
                        bestScore: 0,
                        lastPlayed: null,
                        completion: 0
                    };

                    // Load scores based on module type
                    if (module.id === 'tictactoe') {
                        const scores = localStorage.getItem(module.scoreKey);
                        if (scores) {
                            const parsed = JSON.parse(scores);
                            data.scores = [parsed.X + parsed.O];
                            data.bestScore = Math.max(parsed.X, parsed.O);
                            data.attempts = (parsed.X + parsed.O) > 0 ? 1 : 0;
                            data.completion = ((parsed.X + parsed.O) / module.maxScore) * 100;
                        }
                    }
                    else if (module.id === 'aptitude') {
                        const scores = localStorage.getItem(module.scoreKey);
                        if (scores) {
                            const parsed = JSON.parse(scores);
                            data.scores = parsed.map(s => s.score);
                            data.bestScore = Math.max(...data.scores);
                            data.attempts = parsed.length;
                            data.completion = (data.bestScore / module.maxScore) * 100;
                            if (parsed[0]) data.lastPlayed = parsed[0].date;
                        }
                    }
                    else if (module.id === 'dsa_match') {
                        const scores = localStorage.getItem(module.scoreKey);
                        if (scores) {
                            const parsed = JSON.parse(scores);
                            data.scores = parsed.map(s => s.score);
                            data.bestScore = Math.max(...data.scores);
                            data.attempts = parsed.length;
                            data.completion = (data.bestScore / module.maxScore) * 100;
                            if (parsed[0]) data.lastPlayed = parsed[0].date;
                        }
                    }
                    else if (module.id === 'sql') {
                        const scores = localStorage.getItem(module.scoreKey);
                        if (scores) {
                            const parsed = JSON.parse(scores);
                            data.scores = parsed.map(s => s.score);
                            data.bestScore = Math.max(...data.scores);
                            data.attempts = parsed.length;
                            data.completion = (data.bestScore / module.maxScore) * 100;
                            if (parsed[0]) data.lastPlayed = parsed[0].date;
                        }
                    }
                    else if (module.id === 'feedback') {
                        const feedbacks = localStorage.getItem(module.scoreKey);
                        if (feedbacks) {
                            const parsed = JSON.parse(feedbacks);
                            data.scores = parsed.map(f => f.overallRating);
                            data.bestScore = Math.max(...data.scores);
                            data.attempts = parsed.length;
                            data.completion = (data.bestScore / module.maxScore) * 100;
                            if (parsed[0]) data.lastPlayed = parsed[0].date;
                        }
                    }

                    this.modulesData[module.id] = data;
                });

                this.calculateOverallStats();
            }

            calculateOverallStats() {
                this.overallStats = {
                    totalScore: 0,
                    totalAttempts: 0,
                    completedModules: 0,
                    averageScore: 0
                };

                let totalPercentage = 0;
                let modulesWithData = 0;

                MODULES.forEach(module => {
                    const data = this.modulesData[module.id];
                    if (data.attempts > 0) {
                        this.overallStats.totalScore += data.bestScore;
                        this.overallStats.totalAttempts += data.attempts;
                        totalPercentage += data.completion;
                        modulesWithData++;
                        
                        if (data.completion >= 80) {
                            this.overallStats.completedModules++;
                        }
                    }
                });

                this.overallStats.averageScore = modulesWithData > 0 ? 
                    (this.overallStats.totalScore / modulesWithData).toFixed(1) : 0;
            }

            renderOverview() {
                const container = document.getElementById('statsOverview');
                const totalModules = MODULES.length;
                const playedModules = Object.values(this.modulesData).filter(d => d.attempts > 0).length;
                
                container.innerHTML = `
                    <div class="overview-card">
                        <div class="overview-icon">🎮</div>
                        <div class="overview-value">${playedModules}/${totalModules}</div>
                        <div class="overview-label">Modules Played</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-icon">⭐</div>
                        <div class="overview-value">${this.overallStats.totalScore}</div>
                        <div class="overview-label">Total Score</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-icon">🏆</div>
                        <div class="overview-value">${this.overallStats.completedModules}</div>
                        <div class="overview-label">Completed Modules</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-icon">📊</div>
                        <div class="overview-value">${this.overallStats.averageScore}</div>
                        <div class="overview-label">Avg Score/Module</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-icon">🎯</div>
                        <div class="overview-value">${this.overallStats.totalAttempts}</div>
                        <div class="overview-label">Total Attempts</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-icon">💯</div>
                        <div class="overview-value">${this.getOverallPercentage()}%</div>
                        <div class="overview-label">Overall Progress</div>
                    </div>
                `;
            }

            getOverallPercentage() {
                let totalProgress = 0;
                let modulesWithData = 0;
                
                MODULES.forEach(module => {
                    const data = this.modulesData[module.id];
                    if (data.attempts > 0) {
                        totalProgress += data.completion;
                        modulesWithData++;
                    }
                });
                
                return modulesWithData > 0 ? Math.round(totalProgress / modulesWithData) : 0;
            }

            getModuleStatus(completion) {
                if (completion === 0) return 'not-started';
                if (completion >= 80) return 'completed';
                return 'in-progress';
            }

            getStatusText(status) {
                if (status === 'completed') return '✓ Completed';
                if (status === 'in-progress') return '⏳ In Progress';
                return '⚪ Not Started';
            }

            formatDate(dateString) {
                if (!dateString) return 'Never';
                const date = new Date(dateString);
                const now = new Date();
                const diffTime = Math.abs(now - date);
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays === 0) return 'Today';
                if (diffDays === 1) return 'Yesterday';
                if (diffDays < 7) return `${diffDays} days ago`;
                return date.toLocaleDateString();
            }

            getAchievementBadge(score, maxScore) {
                const percentage = (score / maxScore) * 100;
                if (percentage === 100) return '<span class="badge badge-gold">🏆 Master</span>';
                if (percentage >= 80) return '<span class="badge badge-silver">⭐ Expert</span>';
                if (percentage >= 60) return '<span class="badge badge-bronze">📚 Learner</span>';
                return '';
            }

            renderModules() {
                const container = document.getElementById('modulesGrid');
                
                container.innerHTML = MODULES.map(module => {
                    const data = this.modulesData[module.id];
                    const status = this.getModuleStatus(data.completion);
                    const statusText = this.getStatusText(status);
                    const percentage = data.completion;
                    const achievementBadge = this.getAchievementBadge(data.bestScore, module.maxScore);
                    
                    return `
                        <div class="module-card">
                            <div class="module-header" style="background: ${module.color}">
                                <h3>${module.icon} ${module.name}</h3>
                                <p>${module.description}</p>
                                <div class="module-status status-${status}">${statusText}</div>
                            </div>
                            <div class="module-content">
                                <div class="score-section">
                                    <div class="score-label">
                                        <span>Best Score</span>
                                        <span>${data.bestScore}/${module.maxScore} ${achievementBadge}</span>
                                    </div>
                                    <div class="progress-bar-container">
                                        <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                                    </div>
                                </div>
                                
                                <div class="stats-grid">
                                    <div class="stat-box">
                                        <div class="stat-number">${data.attempts}</div>
                                        <div class="stat-text">Total Attempts</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-number">${data.scores.length}</div>
                                        <div class="stat-text">Sessions</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-number">${data.bestScore}</div>
                                        <div class="stat-text">High Score</div>
                                    </div>
                                    <div class="stat-box">
                                        <div class="stat-number">${this.formatDate(data.lastPlayed)}</div>
                                        <div class="stat-text">Last Played</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            renderRecentActivity() {
                const container = document.getElementById('activityList');
                const activities = [];
                
                // Collect all activities from all modules
                MODULES.forEach(module => {
                    const data = this.modulesData[module.id];
                    if (data.scores.length > 0) {
                        // Get the latest score for this module
                        const latestScore = data.scores[0];
                        const latestDate = data.lastPlayed;
                        
                        if (latestDate) {
                            activities.push({
                                module: module.name,
                                icon: module.icon,
                                score: data.bestScore,
                                maxScore: module.maxScore,
                                date: latestDate,
                                attempts: data.attempts
                            });
                        }
                    }
                });
                
                // Sort by date (most recent first)
                activities.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                if (activities.length === 0) {
                    container.innerHTML = '<div class="no-activity">No activity yet. Start playing to see your progress! 🎮</div>';
                    return;
                }
                
                container.innerHTML = activities.slice(0, 10).map(activity => `
                    <div class="activity-item">
                        <div class="activity-icon">${activity.icon}</div>
                        <div class="activity-details">
                            <div class="activity-title">${activity.module}</div>
                            <div class="activity-meta">
                                Last played: ${this.formatDate(activity.date)} • ${activity.attempts} total attempts
                            </div>
                        </div>
                        <div class="activity-score">
                            ${activity.score}/${activity.maxScore}
                        </div>
                    </div>
                `).join('');
            }

            refresh() {
                this.loadAllData();
                this.renderOverview();
                this.renderModules();
                this.renderRecentActivity();
            }
        }

        // Initialize dashboard
        const dashboard = new ProgressDashboard();

        function refreshDashboard() {
            dashboard.refresh();
            showNotification('Dashboard refreshed!', 'success');
        }

        function resetAllProgress() {
            if (confirm('⚠️ WARNING: This will delete ALL your progress across all modules! This action cannot be undone.\n\nAre you sure you want to continue?')) {
                if (confirm('LAST CHANCE: Type "RESET" to confirm')) {
                    const confirmation = prompt('Type "RESET" to confirm deletion of all data:');
                    if (confirmation === 'RESET') {
                        // Clear all relevant localStorage items
                        const keysToClear = [
                            'tictactoe_scores',
                            'aptitude_high_scores',
                            'dsa_match_scores',
                            'sql_quiz_scores',
                            'interview_arcade_feedbacks',
                            'tictactoe_attempts',
                            'aptitude_attempts',
                            'dsa_match_attempts',
                            'sql_attempts',
                            'feedback_attempts'
                        ];
                        
                        keysToClear.forEach(key => {
                            localStorage.removeItem(key);
                        });
                        
                        dashboard.refresh();
                        showNotification('All progress has been reset!', 'success');
                    } else {
                        showNotification('Reset cancelled - incorrect confirmation', 'error');
                    }
                }
            }
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                background: ${type === 'success' ? '#28a745' : '#dc3545'};
                color: white;
                border-radius: 8px;
                z-index: 10000;
                animation: slideIn 0.3s ease;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
        
        // Load dashboard on page load
        document.addEventListener('DOMContentLoaded', () => {
            dashboard.refresh();
        });
    </script>
</body>
</html>
