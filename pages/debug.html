<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Debug the Code</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #f4f6fb;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 720px;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-bottom: 10px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

select {
  padding: 6px 10px;
  border-radius: 6px;
}

.code-box {
  background: #1e293b;
  color: #e2e8f0;
  padding: 15px;
  border-radius: 10px;
  font-family: monospace;
}

.line {
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.2s;
}

.line:hover {
  background: rgba(255,255,255,0.08);
}

.selected {
  background: rgba(79,70,229,0.5);
}

.correct {
  background: #22c55e !important;
}

.wrong {
  background: #ef4444 !important;
}

.hint {
  margin-top: 10px;
  color: #9333ea;
  font-size: 0.9rem;
}

button {
  margin-top: 10px;
  margin-right: 10px;
  padding: 8px 16px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

.explanation {
  margin-top: 10px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h2>Debug the Code</h2>

  <div class="top-bar">
    <select id="languageSelect" onchange="changeLanguage()">
      <option value="js">JavaScript</option>
      <option value="python">Python</option>
      <option value="java">Java</option>
    </select>

    <button onclick="showHint()">💡 Hint</button>
  </div>

  <div id="codeBox" class="code-box"></div>

  <button onclick="submitAnswer()">Submit</button>

  <div class="hint" id="hint"></div>
  <div class="explanation" id="explanation"></div>
</div>

<script defer src="../games/debug.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug the Code | Interview Arcade</title>
    <link rel="stylesheet" href="../styles/debug.css">
</head>
<body>
    <header class="arcade-header">
        <a href="../modules.html" class="nav-link">← Back to Modules</a>
        <h1>Debug the Code</h1>
        <p class="subtitle">Identify and fix the intentional logic errors.</p>
    </header>

    <main class="game-container">
        <div class="stats-panel">
            <div class="stat-box">Level: <span id="current-level">1</span> / 5</div>
            <div class="stat-box">Score: <span id="score">0</span></div>
            <div class="stat-box">Attempts: <span id="attempts">0</span></div>
        </div>

        <div class="snippet-container">
            <div class="snippet-header">
                <span id="language-badge" class="badge">Language</span>
                <span id="difficulty-badge" class="badge diff">Difficulty</span>
            </div>
            <pre><code id="code-block">Loading...</code></pre>
        </div>

        <div class="interaction-panel">
            <label for="fix-input">Type the corrected line of code:</label>
            <input type="text" id="fix-input" placeholder="e.g., let i = 0;" autocomplete="off" spellcheck="false">
            <button id="submit-btn">Submit Fix</button>
        </div>

        <div id="feedback-panel" class="hidden">
            <h3 id="feedback-title"></h3>
            <p id="feedback-explanation"></p>
            <button id="next-btn" class="hidden">Next Snippet</button>
        </div>

        <div id="game-over-panel" class="hidden">
            <h2>Module Complete</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </main>

    <script src="../games/debug.js"></script>
</body>
</html>
