<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Debug the Code</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #f4f6fb;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 720px;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-bottom: 10px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

select {
  padding: 6px 10px;
  border-radius: 6px;
}

.code-box {
  background: #1e293b;
  color: #e2e8f0;
  padding: 15px;
  border-radius: 10px;
  font-family: monospace;
}

.line {
  padding: 5px 10px;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.2s;
}

.line:hover {
  background: rgba(255,255,255,0.08);
}

.selected {
  background: rgba(79,70,229,0.5);
}

.correct {
  background: #22c55e !important;
}

.wrong {
  background: #ef4444 !important;
}

.hint {
  margin-top: 10px;
  color: #9333ea;
  font-size: 0.9rem;
}

button {
  margin-top: 10px;
  margin-right: 10px;
  padding: 8px 16px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

.explanation {
  margin-top: 10px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h2>Debug the Code</h2>

  <div class="top-bar">
    <select id="languageSelect" onchange="changeLanguage()">
      <option value="js">JavaScript</option>
      <option value="python">Python</option>
      <option value="java">Java</option>
    </select>

    <button onclick="showHint()">💡 Hint</button>
  </div>

  <div id="codeBox" class="code-box"></div>

  <button onclick="submitAnswer()">Submit</button>

  <div class="hint" id="hint"></div>
  <div class="explanation" id="explanation"></div>
</div>

<script defer src="../games/debug.js"></script>
</body>
</html>
