<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Debug the Code</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #f4f6fb;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 700px;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-bottom: 10px;
}

.code-box {
  background: #1e293b;
  color: #e2e8f0;
  padding: 15px;
  border-radius: 10px;
  font-family: monospace;
  margin: 15px 0;
}

.line {
  padding: 4px 8px;
  cursor: pointer;
  border-radius: 6px;
}

.line:hover {
  background: rgba(255,255,255,0.1);
}

.selected {
  background: rgba(79,70,229,0.4);
}

.correct {
  background: #22c55e !important;
}

.wrong {
  background: #ef4444 !important;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.explanation {
  margin-top: 10px;
  font-size: 0.9rem;
  color: #555;
}
</style>
</head>

<body>

<div class="container">
  <h2>Debug the Code</h2>
  <select id="languageSelect" onchange="changeLanguage()">
  <option value="js">JavaScript</option>
  <option value="python">Python</option>
  <option value="java">Java</option>
</select>

  <div id="codeBox" class="code-box"></div>

  <input type="text" id="fixInput" placeholder="Optional: Type the fix..." />

  <button onclick="submitAnswer()">Submit</button>

  <div class="explanation" id="explanation"></div>
</div>

<script defer src="../games/debug.js"></script>
</body>
</html>
