<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Match the Following - Interview Arcade</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    padding: 20px;
}

.game-wrapper {
    max-width: 1200px;
    margin: auto;
    background: white;
    border-radius: 15px;
}

/* columns */
.match-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    padding: 30px;
}

.column {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 10px;
}

.terms-list, .definitions-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* items */
.term-item, .def-item {
    background: white;
    border: 2px solid #ddd;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* hover */
.term-item:hover {
    transform: translateX(5px);
}

.def-item:hover {
    transform: translateX(-5px);
}

/* selected */
.selected {
    background: #667eea;
    color: white;
}

/* correct */
.matched {
    background: #d4edda;
    border-color: #28a745;
}

/* 🔥 FIXED WRONG */
.wrong {
    background: #f8d7da !important;
    border-color: #dc3545 !important;
    color: #721c24 !important;
    transform: scale(1.05);
    box-shadow: 0 0 12px rgba(220,53,69,0.7);
    transition: all 0.2s ease;
}

/* 🔥 prevent hover override */
.term-item.wrong:hover,
.def-item.wrong:hover {
    transform: scale(1.05) !important;
    box-shadow: 0 0 12px rgba(220,53,69,0.7) !important;
}

/* feedback */
.feedback {
    text-align: center;
    padding: 10px;
    margin: 10px;
    display: none;
}

.feedback.success {
    background: #d4edda;
    display: block;
}

.feedback.error {
    background: #f8d7da;
    display: block;
}
</style>
</head>

<body>

<div class="game-wrapper">

    <div class="match-container">

        <div class="column">
            <h3>Terms</h3>
            <div id="termsList"></div>
        </div>

        <div class="column">
            <h3>Definitions</h3>
            <div id="definitionsList"></div>
        </div>

    </div>

    <div id="feedback" class="feedback"></div>

</div>

<script>
const pairs = [
    { term: "Stack", def: "LIFO structure" },
    { term: "Queue", def: "FIFO structure" },
    { term: "Array", def: "Contiguous memory" },
    { term: "Linked List", def: "Nodes connected via pointers" }
];

let terms = pairs.map(p => p.term);
let defs = pairs.map(p => p.def).sort(() => Math.random() - 0.5);

let selectedTerm = null;
let selectedDef = null;

function render() {
    const tList = document.getElementById("termsList");
    const dList = document.getElementById("definitionsList");

    tList.innerHTML = "";
    dList.innerHTML = "";

    terms.forEach((t, i) => {
        const div = document.createElement("div");
        div.className = "term-item";
        div.innerText = t;
        div.onclick = () => selectTerm(i);
        tList.appendChild(div);
    });

    defs.forEach((d, i) => {
        const div = document.createElement("div");
        div.className = "def-item";
        div.innerText = d;
        div.onclick = () => selectDef(i);
        dList.appendChild(div);
    });
}

function selectTerm(i) {
    document.querySelectorAll(".term-item").forEach(el => el.classList.remove("selected"));
    selectedTerm = i;
    document.querySelectorAll(".term-item")[i].classList.add("selected");
}

function selectDef(i) {
    selectedDef = i;
    match();
}

function match() {
    if (selectedTerm === null || selectedDef === null) return;

    const term = terms[selectedTerm];
    const def = defs[selectedDef];
    const correct = pairs.find(p => p.term === term).def;

    const tEl = document.querySelectorAll(".term-item")[selectedTerm];
    const dEl = document.querySelectorAll(".def-item")[selectedDef];

    if (def === correct) {
        tEl.classList.add("matched");
        dEl.classList.add("matched");
        show("✅ Correct!", "success");
    } else {
        tEl.classList.add("wrong");
        dEl.classList.add("wrong");
        show("❌ Wrong!", "error");

        setTimeout(() => {
            tEl.classList.remove("wrong");
            dEl.classList.remove("wrong");
        }, 800);
    }

    selectedTerm = null;
    selectedDef = null;
}

function show(msg, type) {
    const fb = document.getElementById("feedback");
    fb.innerText = msg;
    fb.className = "feedback " + type;
}

render();
</script>

</body>
</html>
