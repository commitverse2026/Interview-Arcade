<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  background: #f4f6fb;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 600px;
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  margin-bottom: 15px;
  color: #333;
}

.stars {
  display: flex;
  gap: 8px;
  font-size: 28px;
  cursor: pointer;
  margin-bottom: 15px;
}

.star {
  color: #ddd;
  transition: 0.2s;
}

.star.active {
  color: #f59e0b;
}

textarea {
  width: 100%;
  height: 80px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-top: 10px;
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  margin-top: 10px;
  border: 1px solid #ddd;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #4338ca;
}

.summary {
  margin-top: 25px;
  border-top: 1px solid #eee;
  padding-top: 15px;
}

.comment {
  background: #f1f3f6;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 0.9rem;
}
</style>
</head>

<body>

<div class="container">
  <h2>Give Your Feedback</h2>

  <div class="stars" id="stars"></div>

  <select id="module">
    <option value="general">General Platform</option>
    <option value="tictactoe">Tic Tac Toe</option>
    <option value="aptitude">Aptitude</option>
    <option value="dsa-match">DSA Match</option>
  </select>

  <textarea id="comment" placeholder="Write your feedback..."></textarea>

  <button onclick="submitFeedback()">Submit</button>

  <div class="summary">
    <h3>Feedback Summary</h3>
    <p id="avgRating">Average Rating: -</p>
    <div id="recentComments"></div>
  </div>
</div>

<script defer src="../games/feedback.js"></script>
</body>
</html>
