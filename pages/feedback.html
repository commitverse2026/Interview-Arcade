<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — Interview Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #111010;
      --ink-muted: #6b6b6b;
      --paper: #faf9f6;
      --paper-off: #f1efe8;
      --accent: #c84b2f;
      --accent-soft: #f5ece8;
      --rule: #d8d6cf;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --max: 640px;
    }
    body {
      font-family: var(--font-body);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.55;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 0 1.5rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-brand span { color: var(--accent); }
    .nav-back {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
    }
    .nav-back:hover { color: var(--accent); }
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 5rem 1.5rem 3rem;
    }
    .page-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }
    .sub {
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--ink-muted);
      margin-bottom: 1.5rem;
    }
    .card-block {
      background: var(--paper-off);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.5rem;
    }
    .star-btn {
      background: none;
      border: none;
      font-size: 1.75rem;
      cursor: pointer;
      color: var(--rule);
      padding: 0 2px;
      line-height: 1;
    }
    .star-btn.is-on { color: var(--accent); }
    .star-btn:focus-visible { outline: 2px solid var(--accent); border-radius: 2px; }
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      border: 1px solid var(--rule);
      border-radius: 6px;
      resize: vertical;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      padding: 12px 22px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 500;
      border-radius: 3px;
      border: none;
      background: var(--ink);
      color: var(--paper);
      cursor: pointer;
    }
    .btn:hover { background: var(--accent); }
    .form-error {
      color: var(--accent);
      font-size: 0.88rem;
      margin-bottom: 0.75rem;
    }
    .thanks {
      background: #e8f5e8;
      border: 1px solid #2a6b2a;
      color: #1a4a1a;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .mod-rate-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--rule);
      font-size: 0.88rem;
    }
    .mod-rate-row:last-child { border-bottom: none; }
    .mod-rate-label { color: var(--ink); }
    .star-row-inline { display: flex; gap: 0; }
    .star-row-inline .star-btn { font-size: 1.25rem; }
    .skip-mod {
      font-size: 0.72rem;
      padding: 4px 8px;
      border: 1px solid var(--rule);
      background: var(--paper);
      cursor: pointer;
      border-radius: 3px;
    }
    .skip-mod:hover { border-color: var(--ink-muted); }
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .sum-card {
      background: var(--paper);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 1rem;
    }
    .sum-card .k {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
    }
    .sum-card .v {
      font-family: var(--font-display);
      font-size: 1.75rem;
      margin-top: 0.25rem;
    }
    .recent-list { list-style: none; }
    .recent-item {
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--rule);
    }
    .recent-head {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 0.82rem;
      margin-bottom: 0.35rem;
    }
    .recent-stars { color: var(--accent); letter-spacing: 1px; }
    .recent-date { color: var(--ink-muted); }
    .recent-comment { font-size: 0.9rem; color: var(--ink); }
    .recent-empty { color: var(--ink-muted); font-size: 0.9rem; padding: 0.5rem 0; }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-brand">Interview <span>Arcade</span></a>
    <a href="../modules.html" class="nav-back">← Modules</a>
  </nav>

  <main>
    <div class="page-eyebrow">Module 09 · Feedback</div>
    <h1>Feedback</h1>
    <p class="sub">Rate the platform and leave a short note. Optional: rate individual modules. Everything stays in your browser (localStorage).</p>

    <div class="thanks" id="thanks" hidden>Thanks — your feedback was saved.</div>

    <form class="card-block" id="fbForm">
      <p class="form-error" id="formError" hidden></p>
      <div class="field">
        <label for="platformStars">Platform rating (required)</label>
        <div id="platformStars"></div>
      </div>
      <div class="field">
        <label for="comment">Comment</label>
        <textarea id="comment" name="comment" maxlength="2000" placeholder="What should we improve?"></textarea>
      </div>
      <div class="field">
        <label>Optional: module ratings</label>
        <div id="moduleRatings"></div>
      </div>
      <button type="submit" class="btn">Submit feedback</button>
    </form>

    <section class="card-block">
      <h2 style="font-family:var(--font-display);font-size:1.2rem;margin-bottom:1rem;">Summary</h2>
      <div class="summary-grid">
        <div class="sum-card">
          <div class="k">Submissions</div>
          <div class="v" id="sumCount">0</div>
        </div>
        <div class="sum-card">
          <div class="k">Avg platform rating</div>
          <div class="v" id="sumAvg">—</div>
        </div>
      </div>
      <h3 style="font-size:0.85rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);margin-bottom:0.5rem;">Recent comments</h3>
      <ul class="recent-list" id="recentList"></ul>
    </section>
  </main>

  <script src="../scripts/storage.js"></script>
  <script src="../games/feedback.js"></script>
</body>
</html>
