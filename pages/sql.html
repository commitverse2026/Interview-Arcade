<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Fill in the Blanks - Interview Arcade</title>
    <link rel="stylesheet" href="../styles/main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-wrapper {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Main Container */
        .sql-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Header */
        .sql-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .sql-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .sql-header p {
            opacity: 0.9;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        /* Question Area */
        .question-area {
            padding: 30px;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .question-title {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
        }

        .question-description {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* SQL Query Display */
        .sql-query {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.8;
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .sql-keyword {
            color: #569cd6;
            font-weight: bold;
        }

        .sql-string {
            color: #ce9178;
        }

        .sql-number {
            color: #b5cea8;
        }

        .blank {
            display: inline-block;
            min-width: 120px;
            padding: 5px 10px;
            margin: 0 5px;
            background: #2d2d2d;
            border: 2px solid #569cd6;
            border-radius: 5px;
            color: #ffd700;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-align: center;
        }

        .blank-input {
            display: inline-block;
            min-width: 150px;
            padding: 5px 10px;
            margin: 0 5px;
            background: white;
            border: 2px solid #569cd6;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #333;
            transition: all 0.3s;
        }

        .blank-input:focus {
            outline: none;
            border-color: #ffc107;
            box-shadow: 0 0 5px rgba(255,193,7,0.5);
        }

        .blank-input.correct {
            border-color: #28a745;
            background: #d4edda;
        }

        .blank-input.incorrect {
            border-color: #dc3545;
            background: #f8d7da;
        }

        /* Navigation Buttons */
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 20px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn.prev {
            background: #6c757d;
            color: white;
        }

        .nav-btn.next {
            background: #667eea;
            color: white;
        }

        .nav-btn.submit {
            background: #28a745;
            color: white;
        }

        .nav-btn.reset {
            background: #ffc107;
            color: #333;
        }

        .nav-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Feedback */
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .feedback.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            display: block;
        }

        .feedback.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
            display: block;
        }

        .feedback.info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
            display: block;
        }

        /* Results Modal */
        .results-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .results-card {
            background: white;
            border-radius: 15px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .results-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            margin: 20px auto;
            position: relative;
        }

        .score-number {
            font-size: 48px;
            font-weight: bold;
            color: #667eea;
        }

        .question-review {
            margin: 20px 0;
        }

        .review-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .review-item.correct {
            border-left: 4px solid #28a745;
            background: #d4edda;
        }

        .review-item.incorrect {
            border-left: 4px solid #dc3545;
            background: #f8d7da;
        }

        .restart-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .question-area {
                padding: 20px;
            }
            
            .sql-query {
                font-size: 12px;
                padding: 15px;
            }
            
            .blank-input {
                min-width: 100px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="sql-container">
            <div class="sql-header">
                <h1>🗄️ SQL Fill in the Blanks</h1>
                <p>Complete the SQL queries by filling in the missing keywords</p>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-label">Question</div>
                    <div class="stat-value" id="currentQuestion">1</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="scoreDisplay">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Total</div>
                    <div class="stat-value" id="totalQuestions">0</div>
                </div>
            </div>

            <div class="question-area">
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>

                <div id="questionContent">
                    <!-- Dynamic content will be loaded here -->
                </div>

                <div class="feedback" id="feedback"></div>

                <div class="navigation">
                    <button class="nav-btn prev" onclick="previousQuestion()">← Previous</button>
                    <button class="nav-btn reset" onclick="resetCurrentQuestion()">Reset Answers</button>
                    <button class="nav-btn next" onclick="nextQuestion()">Next →</button>
                    <button class="nav-btn submit" onclick="submitQuiz()">Submit Quiz ✓</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Results Modal -->
    <div class="results-overlay" id="resultsOverlay">
        <div class="results-card">
            <div class="results-header">
                <h2>📊 Quiz Results</h2>
            </div>
            <div class="score-circle" style="text-align: center;">
                <div class="score-number" id="finalScore">0</div>
                <div class="score-total" id="totalScore">/0</div>
            </div>
            <div id="resultsContent"></div>
            <button class="restart-btn" onclick="restartQuiz()">🔄 Restart Quiz</button>
        </div>
    </div>

    <script src="../data/sql-queries.js"></script>
    <script src="../games/sql.js"></script>
</body>
</html>
